<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
        }

        #qr-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            z-index: 1000;
        }

        #qrcode {
            margin: 10px auto;
            display: inline-block;
        }

        .qr-text {
            font-size: 14px;
            margin: 0;
            color: #333;
            max-width: 200px;
            word-wrap: break-word;
        }

        .qr-hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            #qr-container {
                display: none;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>
    <div id="qr-container">
        <p class="qr-text"><strong>Scan to view in AR</strong></p>
        <div id="qrcode"></div>
        <p class="qr-text" id="qr-url-text"></p>
        <p class="qr-hint" id="qr-hint-text"></p>
    </div>

    <model-viewer src="model.glb" ar ar-modes="webxr scene-viewer quick-look"
        camera-controls auto-rotate shadow-intensity="1" alt="3D model">
    </model-viewer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var port = window.location.port || '8000';
            var path = window.location.pathname;
            var host = window.location.hostname;
            var isLocalhost = (host === 'localhost' || host === '127.0.0.1' || host === '');

            // Use the detected local network IP as fallback if opened via localhost
            var qrHost = host;
            var qrUrl = window.location.protocol + '//' + qrHost + (port ? ':' + port : '') + path;

            document.getElementById('qr-url-text').innerText = qrUrl;

            if (isLocalhost) {
                document.getElementById('qr-hint-text').innerText = 'Using local network IP instead of localhost.';
            }

            new QRCode(document.getElementById("qrcode"), {
                text: qrUrl,
                width: 150,
                height: 150,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
        });
    </script>
</body>

</html>
